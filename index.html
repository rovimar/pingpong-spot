<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PingPong HD - Mesas en Heidelberg</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sport: {
                            blue: '#0EA5E9',
                            darkBlue: '#0369A1',
                            orange: '#F97316',
                            darkOrange: '#EA580C',
                            navy: '#0F172A'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0F172A;
            color: white;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-gradient {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.1) 0%, rgba(249, 115, 22, 0.05) 100%);
        }

        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.33); opacity: 1; }
            80%, 100% { transform: scale(2); opacity: 0; }
        }

        .slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .marker-pin {
            width: 40px;
            height: 40px;
            border-radius: 50% 50% 50% 0;
            background: #F97316;
            position: absolute;
            transform: rotate(-45deg);
            left: 50%;
            top: 50%;
            margin: -20px 0 0 -20px;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
        }
        
        .marker-pin i {
            transform: rotate(45deg);
            color: white;
            font-size: 18px;
        }

        .status-good { background: linear-gradient(135deg, #10B981, #059669); }
        .status-regular { background: linear-gradient(135deg, #F59E0B, #D97706); }
        
        .sport-btn {
            background: linear-gradient(135deg, #0EA5E9, #0284C7);
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }
        
        .sport-btn-orange {
            background: linear-gradient(135deg, #F97316, #EA580C);
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }

        #map {
            height: 100vh;
            width: 100%;
            z-index: 0;
        }

        .bottom-sheet {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .photo-scroll {
            scroll-snap-type: x mandatory;
        }
        .photo-scroll img {
            scroll-snap-align: start;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden relative">

    <!-- Loading Screen -->
    <div id="loadingScreen" class="fixed inset-0 bg-sport-navy z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative mb-8">
            <div class="w-24 h-24 rounded-full bg-sport-orange flex items-center justify-center relative z-10">
                <i class="fas fa-table-tennis text-4xl text-white animate-bounce"></i>
            </div>
            <div class="absolute inset-0 rounded-full bg-sport-orange pulse-ring"></div>
        </div>
        <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">PingPong<span class="text-sport-orange">HD</span></h1>
        <p class="text-gray-400 text-sm">Heidelberg & Neckargemünd</p>
        <div class="mt-8 w-48 h-1 bg-gray-800 rounded-full overflow-hidden">
            <div id="loadingBar" class="h-full bg-gradient-to-r from-sport-blue to-sport-orange w-0 transition-all duration-1000"></div>
        </div>
    </div>

    <!-- Main Map Container -->
    <div id="map"></div>

    <!-- Top Bar -->
    <div class="fixed top-0 left-0 right-0 z-[1000] p-4 pointer-events-none">
        <div class="glass-panel rounded-2xl p-4 pointer-events-auto shadow-2xl">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-sport-blue to-sport-orange flex items-center justify-center shadow-lg">
                        <i class="fas fa-table-tennis text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg leading-tight">PingPong<span class="text-sport-orange">HD</span></h1>
                        <p class="text-xs text-gray-400" id="locationStatus">Obteniendo ubicación...</p>
                    </div>
                </div>
                <button onclick="recenterMap()" class="w-10 h-10 rounded-full bg-sport-blue/20 border border-sport-blue/30 flex items-center justify-center active:scale-95 transition-transform">
                    <i class="fas fa-location-arrow text-sport-blue"></i>
                </button>
            </div>
            
            <!-- Search/Filter -->
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                <input type="text" id="searchInput" placeholder="Buscar mesas..." 
                    class="w-full bg-gray-800/50 border border-gray-700 rounded-xl py-2.5 pl-10 pr-4 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-sport-blue transition-colors"
                    oninput="filterTables()">
            </div>
        </div>
    </div>

    <!-- View Toggle -->
    <div class="fixed top-36 right-4 z-[1000] flex flex-col gap-2">
        <button onclick="showView('map')" id="btnMap" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-sport-orange border-sport-orange/50 shadow-lg transition-all active:scale-95">
            <i class="fas fa-map text-lg"></i>
        </button>
        <button onclick="showView('list')" id="btnList
