<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PingPong Spot — Heidelberg & Neckargemünd</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
  <style>
    :root {
      --primary: #F97316; --primary-dark: #C2410C; --bg: #0F172A;
      --surface: #1E293B; --surface-2: #334155; --border: #475569;
      --text: #F1F5F9; --text-2: #94A3B8; --white: #FFFFFF;
      --error: #EF4444; --success: #10B981; --warning: #F59E0B;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
    #app { width: 100%; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 12px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; }
    .view { flex: 1; overflow: auto; display: none; }
    .view.active { display: block; }
    #map { width: 100%; height: 100%; }
    .tabs { display: flex; background: var(--surface); border-top: 1px solid var(--border); }
    .tab { flex: 1; padding: 10px; text-align: center; color: var(--text-2); background: transparent; border: none; }
    .tab.active { color: var(--primary); }
    .tab i { display: block; font-size: 20px; }
    #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; }
    .btn { padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-google { background: white; color: #333; display: flex; gap: 8px; align-items: center; }
  </style>
</head>
<body>

  <div id="login-screen">
    <h1 style="color:var(--primary)">PingPong Spot</h1>
    <button class="btn btn-google" onclick="signInWithGoogle()">
      <i class="mdi mdi-google"></i> Continuar con Google
    </button>
  </div>

  <div id="app" style="display:none;">
    <header class="header">
      <h2 style="margin:0; font-size:18px;">PingPong Spot</h2>
      <button class="btn btn-primary" style="padding:5px 10px" onclick="signOut()">Salir</button>
    </header>

    <section id="view-map" class="view active"><div id="map"></div></section>
    <section id="view-list" class="view"><div style="padding:20px;">Lista de Mesas...</div></section>
    <section id="view-add" class="view"><div style="padding:20px;">Formulario de Añadir...</div></section>

    <nav class="tabs">
      <button class="tab active" onclick="setView('map')"><i class="mdi mdi-map"></i>Mapa</button>
      <button class="tab" onclick="setView('list')"><i class="mdi mdi-format-list-bulleted"></i>Lista</button>
      <button class="tab" onclick="setView('add')"><i class="mdi mdi-plus-circle"></i>Añadir</button>
    </nav>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/+esm";
    
    const SUPABASE_URL = "https://xqunorualimwmhosqxsj.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // Tu clave actual

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    window.signInWithGoogle = async () => {
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin }
      });
    };

    window.signOut = async () => {
      await supabase.auth.signOut();
      location.reload();
    };

    window.setView = (viewId) => {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('view-' + viewId).classList.add('active');
      event.currentTarget.classList.add('active');
    };

    // Verificar sesión al cargar
    supabase.auth.onAuthStateChange((event, session) => {
      if (session) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        initMap();
      }
    });

    function initMap() {
      const map = L.map('map').setView([49.4093, 8.6929], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }
  </script>
</body>
</html>
