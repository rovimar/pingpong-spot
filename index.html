<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PingPong Spot</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
  <style>
    :root {
      --primary: #F97316; --bg: #0F172A; --surface: #1E293B; --border: #475569; --text: #F1F5F9;
    }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    .header { padding: 15px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .view { flex: 1; overflow-y: auto; display: none; padding-bottom: 80px; }
    .view.active { display: block; }
    #map { width: 100%; height: 100%; }
    
    /* Formulario */
    .form-group { padding: 15px; }
    input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #334155; border: 1px solid var(--border); color: white; border-radius: 8px; font-size: 16px; }
    .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: #475569; color: white; margin-bottom: 10px; }

    /* Pestañas */
    .tabs { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--surface); border-top: 1px solid var(--border); height: 70px; z-index: 2000; }
    .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94A3B8; background: none; border: none; }
    .tab.active { color: var(--primary); }
    .tab i { font-size: 24px; }

    #photo-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .photo-item { position: relative; width: 70px; height: 70px; }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 2px solid var(--primary); }
  </style>
</head>
<body>

  <div id="app">
    <header class="header">
      <h2 style="margin:0; font-size:18px;">PingPong Spot</h2>
      <button onclick="location.reload()" style="background:none; border:none; color:white;"><i class="mdi mdi-refresh"></i></button>
    </header>

    <section id="view-map" class="view active">
      <div id="map"></div>
    </section>

    <section id="view-add" class="view">
      <div class="form-group">
        <h3>Añadir Nueva Mesa</h3>
        
        <label>Nombre del lugar</label>
        <input type="text" id="table-name" placeholder="Ej: Parque Central">
        
        <label>Descripción</label>
        <textarea id="table-desc" placeholder="¿Cómo son las mesas?"></textarea>

        <button class="btn btn-secondary" onclick="useCurrentLocation()">
          <i class="mdi mdi-crosshairs-gps"></i> Usar mi ubicación actual
        </button>
        <div id="location-status" style="font-size:12px; margin-bottom:15px; color:var(--primary);"></div>

        <button class="btn btn-secondary" onclick="document.getElementById('photo-input').click()">
          <i class="mdi mdi-camera"></i> Seleccionar fotos
        </button>
        <input type="file" id="photo-input" multiple accept="image/*" style="display:none;" onchange="handlePhotos(event)">
        
        <div id="photo-preview"></div>

        <button class="btn btn-primary" onclick="saveTable()" style="margin-top:20px;">
          <i class="mdi mdi-content-save"></i> GUARDAR MESA
        </button>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab active" onclick="setView('map')"><i class="mdi mdi-map"></i><span>Mapa</span></button>
      <button class="tab" onclick="setView('add')"><i class="mdi mdi-plus-circle"></i><span>Añadir</span></button>
    </nav>
  </div>

  <script>
    let map;
    let userCoords = null;
    let selectedPhotos = [];

    // Cambiar entre Mapa y Añadir
    window.setView = (viewId) => {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('view-' + viewId).classList.add('active');
      event.currentTarget.classList.add('active');
      if(viewId === 'map') setTimeout(() => map.invalidateSize(), 200);
    };

    // Inicializar Mapa
    function initMap() {
      map = L.map('map').setView([49.4093, 8.6929], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }

    // Ubicación GPS
    window.useCurrentLocation = () => {
      document.getElementById('location-status').innerText = "Obteniendo ubicación...";
      navigator.geolocation.getCurrentPosition((pos) => {
        userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        document.getElementById('location-status').innerText = "📍 Ubicación fijada con éxito";
      }, (err) => {
        alert("Error al obtener ubicación. Activa el GPS.");
      });
    };

    // Manejo de fotos
    window.handlePhotos = (e) => {
      const files = Array.from(e.target.files);
      selectedPhotos = [...selectedPhotos, ...files];
      const preview = document.getElementById('photo-preview');
      preview.innerHTML = selectedPhotos.map(f => `<div class="photo-item"><img src="${URL.createObjectURL(f)}"></div>`).join("");
    };

    // Guardar (Aquí conectarías con Supabase)
    window.saveTable = () => {
      const name = document.getElementById('table-name').value;
      if(!name || !userCoords) return alert("Ponle un nombre y usa el GPS");
      alert("¡Mesa guardada correctamente!");
      setView('map');
    };

    window.onload = initMap;
  </script>
</body>
</html>
